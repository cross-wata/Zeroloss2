<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あどべんドットかれんだー</title>
  <link rel="stylesheet" href="../css/calendar.css">
</head>
<body>
<div class="bg-wrapper">
  <audio id="bgm" src="/bgm/tekuteku.mp3" loop></audio>

  <!-- 背景画像 -->
  <img id="bgImage" src="/images/image2.png" class="bg-image" alt="背景">

  <!-- カレンダー -->
  <div class="calendar-container">

    <!-- 曜日 -->
    <div class="week-row" id="week"></div>

    <!-- 日付 -->
    <div class="calendar-grid" id="calendar"></div>
  </div>

  <!-- 月表示（追加） -->
  <div id="month" class="month"></div>


  <!-- ステージ画像 -->
  <div class="stage-box">
    <img id="stageImage" src="/images/stage1.png" class="stage-image">
  </div>

  <div class="free-img">
    <img id="free-image" src="/images/object1.png" class="free-img">
  </div>

  <div class="free2-img">
   <img id="free2-image" src="/images/object2.png" class="free2-img">
  </div>

  <div class="free3-img">
    <img id="free3-image" src="/images/object3.png" class="free3-img">
  </div>

  <div class="free4-img">
    <img id="free4-image" src="/images/object4.png" class="free4-img">
  </div>

  <div class="free5-img">
    <img id="free5-image" src="/images/object5.png" class="free5-img">
  </div>

  <div class="free6-img">
    <img id="free6-image" src="/images/object6.png" class="free6-img">
  </div>

<!-- メッセージ表示 -->
<div class="message-box">
  <p id="message"></p>
</div>

<script>
  document.addEventListener("click", () => {
    const bgm = document.getElementById("bgm");
    bgm.volume = 0.2;
    bgm.play();
  }, { once: true });
</script>

<!-- JS読み込み -->
<script src="/js/message.js"></script>
</body>
</html>
