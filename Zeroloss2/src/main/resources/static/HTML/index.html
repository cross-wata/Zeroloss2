<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カレンダー</title>
  <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>

<div class="bg-wrapper">

  <!-- 背景画像 -->
  <img src="/images/image2.png" class="bg-image" alt="背景">

  <!-- カレンダー -->
  <div class="calendar-container">
    <div class="calendar-grid" id="calendar"></div>
  </div>

  <!-- ステージ画像 -->
<div class="stage-box">
    <img id="stageImage" src="/images/stage1.png" class="stage-image" alt="ステージ画像">
</div>


<div class="message-box">
  <p id="message"></p>
</div>

<script src="/js/message.js"></script>
</body>
</html>
