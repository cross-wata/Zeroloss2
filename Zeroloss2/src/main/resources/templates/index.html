<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あどべんドットかれんだー</title>
  <link rel="stylesheet" href="../css/calendar.css">
</head>
<body>
<div class="bg-wrapper">
  <audio id="bgm" src="/bgm/tekuteku.mp3" loop></audio>
  <!-- 背景画像 -->
  <img id="bgImage" src="/images/image2.png" class="bg-image" alt="背景">

  <!-- カレンダー -->
  <div class="calendar-container">

    <!-- 月表示（追加） -->
    <div id="month" class="month"></div>

    <!-- 曜日 -->
    <div class="week-row" id="week"></div>

    <!-- 日付 -->
    <div class="calendar-grid" id="calendar"></div>
  </div>

  <!-- ステージ画像 -->
  <div class="stage-box">
    <img id="stageImage" src="/images/stage1.png" class="stage-image">
  </div>

</div>

<!-- メッセージ表示 -->
<div class="message-box">
  <p id="message"></p>
</div>

<script>
  document.addEventListener("click", () => {
    const bgm = document.getElementById("bgm");
    bgm.volume = 0.2;
    bgm.play();
  }, { once: true });
</script>

<!-- JS読み込み -->
<script src="/js/message.js"></script>
</body>
</html>
